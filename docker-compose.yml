services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"         # FastAPI + Socket.IO (WebSocket)
      - "5020:5020"         # Modbus/TCP      — Scenario 1: HydraGuard
      - "5021:5021/udp"     # SNMP v2c        — Scenario 2: MetroGrid Traffic
      - "5022:5022"         # IEC 61850 MMS   — Scenario 3: Northgate Substation
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
